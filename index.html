<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 18px;
            flex-direction: column;
            z-index: 10;
        }
        #overlay span {
            margin-top: 12px;
            font-size: 15px;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Video Tầng 2 (tự động phát) -->
        <video id="player" controls autoplay playsinline muted></video>
        
        <!-- Overlay thông báo redirect -->
        <div id="overlay">
            <div>Đang chuyển hướng...</div>
            <span>Chờ 10 giây</span>
        </div>
    </div>

    <script>
        // ====================== CẤU HÌNH ======================
        const VIDEO_BASE   = "http://cdn.videy.co";   // Tầng 2 – video sẽ phát
        const REDIRECT_URL = "https://testlink.com"; // Tầng 3 – link redirect sau 10s (cố định)
        const DELAY_MS     = 10000;                  // 10 giây
        // =====================================================

        function getFilename() {
            let path = window.location.pathname;
            let filename = path.split('/').pop();
            
            // Hỗ trợ cả .mp4 và .mov
            if (!filename || (!filename.endsWith('.mp4') && !filename.endsWith('.mov'))) {
                filename = '0437be931.mp4'; // fallback
            }
            return filename;
        }

        function init() {
            const filename = getFilename();
            const videoUrl = `${VIDEO_BASE}/${filename}`;

            console.log(`🎥 Đang phát video Tầng 2: ${videoUrl}`);
            console.log(`⏰ Sau 10 giây sẽ redirect sang Tầng 3: ${REDIRECT_URL}`);

            // Load video và tự động phát
            const video = document.getElementById('player');
            video.src = videoUrl;
            video.play().catch(err => console.log('Auto-play bị chặn:', err));

            // Countdown + overlay
            const overlay = document.getElementById('overlay');
            const countdownEl = overlay.querySelector('span');
            let secondsLeft = 10;

            const countdownInterval = setInterval(() => {
                secondsLeft--;
                countdownEl.textContent = `Chờ ${secondsLeft} giây`;
                if (secondsLeft <= 0) clearInterval(countdownInterval);
            }, 1000);

            // Redirect sau đúng 10 giây
            setTimeout(() => {
                clearInterval(countdownInterval);
                overlay.style.display = 'flex';
                window.location.href = REDIRECT_URL;
            }, DELAY_MS);
        }

        window.onload = init;
    </script>
</body>
</html>
