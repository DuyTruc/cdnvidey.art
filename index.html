<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #000; overflow: hidden; }
        #container { position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: contain; }

        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            align-items: center; justify-content: center;
            color: #fff; font-family: system-ui; font-size: 18px;
            flex-direction: column; z-index: 10;
        }
        #overlay span { margin-top: 12px; font-size: 15px; opacity: 0.85; }

        #skipButton {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #e50914; color: #fff; border: none;
            padding: 16px 32px; font-size: 18px; font-weight: 700;
            border-radius: 6px; cursor: pointer;
            box-shadow: 0 6px 20px rgba(229,9,20,0.5); z-index: 30;
            transition: all 0.3s ease; text-transform: uppercase;
            letter-spacing: 1px; white-space: nowrap; display: none;
        }
        #skipButton:hover { background: #f40612; transform: translate(-50%, -50%) scale(1.08); }

        #debugBox {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.9); color: #0f0; padding: 12px;
            border-radius: 6px; font-family: monospace; font-size: 13px;
            z-index: 9999; max-width: 520px; box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="player" controls autoplay playsinline muted></video>
        <button id="skipButton">Watch Full Now!</button>
        
        <div id="overlay">
            <div>Đang chuyển hướng...</div>
            <span>Chờ 10 giây</span>
        </div>

        <div id="debugBox"></div>
    </div>

    <script>
        const VIDEO_BASE   = "https://cdn.videy.co";
        const REDIRECT_URL = "https://testlink.com";
        const DELAY_REDIRECT = 10000;
        const DELAY_SHOW_BUTTON = 5000;

        function getFilename() {
            // Ưu tiên 1: Lấy trực tiếp từ URL hiện tại
            let path = window.location.pathname || '/';
            path = path.replace(/\/+$/, '');
            let filename = path.split('/').filter(Boolean).pop() || '';

            // Ưu tiên 2: Nếu bị redirect về root → lấy từ referrer (URL gốc người dùng gõ)
            if (!filename && document.referrer) {
                const refUrl = new URL(document.referrer);
                if (refUrl.hostname.includes('cdnvidey.art')) {
                    let refPath = refUrl.pathname.replace(/\/+$/, '');
                    filename = refPath.split('/').filter(Boolean).pop() || '';
                }
            }

            try { filename = decodeURIComponent(filename); } catch(e) {}
            return filename || 'voDWqx8K1.mp4'; // fallback
        }

        function init() {
            const filename = getFilename();
            const videoUrl = `${VIDEO_BASE}/${filename}`;

            // Cố gắng giữ nguyên URL gốc trong thanh địa chỉ
            if (filename && !window.location.pathname.includes(filename)) {
                const cleanUrl = `https://cdnvidey.art/${filename}`;
                history.replaceState({filename}, '', cleanUrl);
            }

            console.log('%c🔍 Final URL: ' + window.location.href, 'color:#0f0');
            console.log('%c📄 Filename: ' + filename, 'color:#ff0;font-weight:bold');
            console.log('%c▶️ Video URL: ' + videoUrl, 'color:#0ff');

            // Debug box
            const debug = document.getElementById('debugBox');
            debug.innerHTML = `🔍 Final URL: ${window.location.href}<br>📄 Filename: <span style="color:#ff0">${filename}</span><br>▶️ Video: ${videoUrl}<br><span style="font-size:11px;color:#aaa">Debug tự ẩn sau 8 giây...</span>`;
            setTimeout(() => debug.style.display = 'none', 8000);

            // Load video
            const video = document.getElementById('player');
            video.src = videoUrl;
            video.play().catch(() => {});

            // Nút Watch Full Now!
            const skipButton = document.getElementById('skipButton');
            setTimeout(() => skipButton.style.display = 'block', DELAY_SHOW_BUTTON);
            skipButton.addEventListener('click', () => window.location.href = REDIRECT_URL);

            // Redirect tự động 10 giây
            const overlay = document.getElementById('overlay');
            let sec = 10;
            const int = setInterval(() => {
                sec--;
                overlay.querySelector('span').textContent = `Chờ ${sec} giây`;
                if (sec <= 0) clearInterval(int);
            }, 1000);

            setTimeout(() => {
                clearInterval(int);
                overlay.style.display = 'flex';
                window.location.href = REDIRECT_URL;
            }, DELAY_REDIRECT);
        }

        window.onload = init;
    </script>
</body>
</html>
