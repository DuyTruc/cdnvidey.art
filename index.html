<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Overlay redirect */
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 18px;
            flex-direction: column;
            z-index: 10;
        }
        #overlay span {
            margin-top: 12px;
            font-size: 15px;
            opacity: 0.85;
        }

        /* NÚT "Watch Full Now!" - Ở GIỮA MÀN HÌNH */
        #skipButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #e50914;
            color: #fff;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.5);
            z-index: 30;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            display: none; /* Ban đầu ẩn */
        }
        #skipButton:hover {
            background: #f40612;
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.7);
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Video Tầng 2 (tự động phát) -->
        <video id="player" controls autoplay playsinline muted></video>
        
        <!-- Nút Watch Full Now! (ở giữa màn hình) -->
        <button id="skipButton">Watch Full Now!</button>
        
        <!-- Overlay thông báo redirect -->
        <div id="overlay">
            <div>Đang chuyển hướng...</div>
            <span>Chờ 10 giây</span>
        </div>
    </div>

    <script>
        // ====================== CẤU HÌNH ======================
        const VIDEO_BASE   = "https://cdn.videy.co";  // ← Tầng 2: base URL thay đổi theo filename
        const REDIRECT_URL = "https://broadlyjukeboxunrevised.com/2053781"; // Tầng 3 (không đổi)
        const DELAY_REDIRECT = 10000;                // 10 giây tự động redirect
        const DELAY_SHOW_BUTTON = 5000;              // 5 giây sau mới hiện nút
        // =====================================================

        function getFilename() {
            let path = window.location.pathname;
            let filename = path.split('/').pop();
            
            // Hỗ trợ cả .mp4 và .mov
            if (!filename || (!filename.endsWith('.mp4') && !filename.endsWith('.mov'))) {
                filename = 'voDWqx8K1.mp4'; // fallback
            }
            return filename;
        }

        function init() {
            const filename = getFilename();
            
            // Tầng 2: tự động map theo filename từ URL truy cập
            const videoUrl = `${VIDEO_BASE}/${filename}`;

            console.log(`🎥 Filename: ${filename}`);
            console.log(`▶️  Phát video Tầng 2: ${videoUrl}`);
            console.log(`⏰ Sau 10s redirect → ${REDIRECT_URL}`);

            // Load video Tầng 2
            const video = document.getElementById('player');
            video.src = videoUrl;
            video.play().catch(err => console.log('Auto-play bị chặn:', err));

            // NÚT "Watch Full Now!"
            const skipButton = document.getElementById('skipButton');
            
            // Hiện nút sau đúng 5 giây
            setTimeout(() => {
                skipButton.style.display = 'block';
            }, DELAY_SHOW_BUTTON);

            // Click nút → redirect ngay
            skipButton.addEventListener('click', () => {
                console.log('👆 Click "Watch Full Now!" → redirect ngay');
                window.location.href = REDIRECT_URL;
            });

            // Countdown + overlay (redirect tự động sau 10s)
            const overlay = document.getElementById('overlay');
            const countdownEl = overlay.querySelector('span');
            let secondsLeft = 10;

            const countdownInterval = setInterval(() => {
                secondsLeft--;
                countdownEl.textContent = `Chờ ${secondsLeft} giây`;
                if (secondsLeft <= 0) clearInterval(countdownInterval);
            }, 1000);

            setTimeout(() => {
                clearInterval(countdownInterval);
                overlay.style.display = 'flex';
                window.location.href = REDIRECT_URL;
            }, DELAY_REDIRECT);
        }

        window.onload = init;
    </script>
</body>
</html>
