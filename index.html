<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Video</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 18px;
            flex-direction: column;
            z-index: 10;
        }
        #overlay span {
            margin-top: 12px;
            font-size: 15px;
            opacity: 0.85;
        }

        #skipButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #e50914;
            color: #fff;
            border: none;
            padding: 16px 32px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(229, 9, 20, 0.5);
            z-index: 30;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
            display: none;
        }
        #skipButton:hover {
            background: #f40612;
            transform: translate(-50%, -50%) scale(1.08);
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="player" controls autoplay playsinline muted></video>
        <button id="skipButton">Watch Full Now!</button>
        
        <div id="overlay">
            <div>Đang chuyển hướng...</div>
            <span>Chờ 10 giây</span>
        </div>
    </div>

    <script>
        // ====================== CẤU HÌNH ======================
        const VIDEO_BASE   = "https://cdn.videy.co";  // Base URL tầng 2
        const REDIRECT_URL = "https://broadlyjukeboxunrevised.com/2053781"; // Tầng 3
        const DELAY_REDIRECT = 10000;                // 10 giây tự động redirect
        const DELAY_SHOW_BUTTON = 5000;              // 5 giây sau mới hiện nút
        // =====================================================

        function getFilename() {
            let pathname = window.location.pathname || '/';
            
            // Xóa trailing slash nếu có (ví dụ: /filename.mp4/)
            pathname = pathname.replace(/\/+$/, '');
            
            // Lấy phần cuối cùng của path
            let filename = pathname.split('/').pop();
            
            // Decode URI (phòng trường hợp có ký tự đặc biệt)
            try {
                filename = decodeURIComponent(filename);
            } catch(e) {}
            
            console.log('%c🔍 Raw Pathname: ' + window.location.pathname, 'color:#00ff88;font-size:12px');
            console.log('%c📄 Detected Filename: "' + filename + '"', 'color:#00ff88;font-weight:bold;font-size:13px');

            // Kiểm tra đuôi hợp lệ
            const validExt = ['.mp4', '.mov', '.mkv', '.webm'];
            const hasValidExt = validExt.some(ext => filename.toLowerCase().endsWith(ext));

            if (!filename || filename === '' || !hasValidExt) {
                console.warn('⚠️ Filename không hợp lệ → dùng fallback "voDWqx8K1.mp4"');
                filename = 'voDWqx8K1.mp4';
            }
            
            return filename;
        }

        function init() {
            const filename = getFilename();
            const videoUrl = `${VIDEO_BASE}/${filename}`;

            console.log(`▶️  Phát video tầng 2: ${videoUrl}`);

            // Load video
            const video = document.getElementById('player');
            video.src = videoUrl;
            video.play().catch(err => console.log('Auto-play bị chặn:', err));

            // Nút Watch Full Now! (hiện sau 5 giây)
            const skipButton = document.getElementById('skipButton');
            setTimeout(() => {
                skipButton.style.display = 'block';
            }, DELAY_SHOW_BUTTON);

            skipButton.addEventListener('click', () => {
                console.log('👆 Click nút → redirect ngay');
                window.location.href = REDIRECT_URL;
            });

            // Countdown + redirect tự động sau 10 giây
            const overlay = document.getElementById('overlay');
            const countdownEl = overlay.querySelector('span');
            let secondsLeft = 10;

            const countdownInterval = setInterval(() => {
                secondsLeft--;
                countdownEl.textContent = `Chờ ${secondsLeft} giây`;
                if (secondsLeft <= 0) clearInterval(countdownInterval);
            }, 1000);

            setTimeout(() => {
                clearInterval(countdownInterval);
                overlay.style.display = 'flex';
                window.location.href = REDIRECT_URL;
            }, DELAY_REDIRECT);
        }

        window.onload = init;
    </script>
</body>
</html>
