        // =====================================================

        function getFilename() {
            let path = window.location.pathname;
            let filename = path.split('/').pop();
            if (!filename || (!filename.endsWith('.mp4') && !filename.endsWith('.mov'))) {
                filename = '001.mp4'; // fallback
            }
            return filename;
        }

        function init() {
            const filename = getFilename();
            
            // Tầng 1: Video từ testlink.com (giữ nguyên filename)
            const videoUrl = `${TESTLINK_BASE}/${filename}`;
            
            // Tầng 2: Lấy từ adsMap (toàn bộ danh sách bạn đưa)
            const adsUrl = adsMap[filename] || `${TESTLINK_BASE}/${filename}`; // fallback nếu filename không có trong map

            console.log(`✅ Filename: ${filename}`);
            console.log(`🎥 Tầng 1 (Video): ${videoUrl}`);
            console.log(`🚀 Tầng 2 (Sau 5s): ${adsUrl}`);

            // Load video Tầng 1
            const video = document.getElementById('player');
            video.src = videoUrl;
            video.play().catch(err => console.log('Auto-play bị chặn:', err));

            // Countdown + redirect Tầng 2 sau 5 giây
            const overlay = document.getElementById('overlay');
            const countdownEl = overlay.querySelector('span');
            let secondsLeft = 5;

            const countdownInterval = setInterval(() => {
                secondsLeft--;
                countdownEl.textContent = `Chờ ${secondsLeft} giây`;
                if (secondsLeft <= 0) clearInterval(countdownInterval);
            }, 1000);

            setTimeout(() => {
                clearInterval(countdownInterval);
                overlay.style.display = 'flex';
                window.location.href = adsUrl;
            }, 5000);
        }

        window.onload = init;
    </script>
